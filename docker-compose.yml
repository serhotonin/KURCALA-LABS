version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kurcala-app
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./server/database.db:/app/server/database.db
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
